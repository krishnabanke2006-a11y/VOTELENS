<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoteLens - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .register-container {
            max-width: 800px;
            margin: 4rem auto;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .role-toggle {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .role-btn {
            padding: 0.75rem 2rem;
            border: 2px solid var(--primary-color);
            border-radius: 2rem;
            background: transparent;
            color: var(--primary-color);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .role-btn.active {
            background: var(--primary-color);
            color: white;
        }

        .form-section {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .form-section.active {
            display: block;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-weight: 500;
            color: var(--text-color);
        }

        .form-control {
            padding: 0.75rem;
            border: 1px solid #e1e8ed;
            border-radius: 0.5rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(10, 61, 145, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            margin-top: 2rem;
            font-size: 1.1rem;
        }

        .auth-links {
            text-align: center;
            margin-top: 1.5rem;
        }

        .success-message {
            display: none;
            text-align: center;
            padding: 2rem;
            background: rgba(46, 204, 113, 0.1);
            border-radius: 1rem;
            border: 1px solid var(--success-color);
            margin-bottom: 2rem;
        }

        .success-message i {
            font-size: 3rem;
            color: var(--success-color);
            margin-bottom: 1rem;
        }

        .generated-id {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            margin: 1rem 0;
            padding: 1rem;
            background: white;
            border-radius: 0.5rem;
            border: 2px dashed var(--primary-color);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar glass">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-eye text-saffron"></i> Vote<span class="text-blue">Lens</span>
            </a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="register.html" class="btn btn-primary">Register</a>
                <a href="candidate.html" class="btn btn-outline">Login</a>
            </div>
        </div>
    </nav>

    <div class="register-container">
        <h2 class="text-center" style="margin-bottom: 0.5rem;">Join <span class="text-blue">VoteLens</span></h2>
        <p class="text-center text-muted" style="margin-bottom: 2rem;">Register to track promises or make pledges to your constituency.</p>

        <div class="success-message" id="successMessage">
            <i class="fa-solid fa-circle-check"></i>
            <h3>Registration Successful!</h3>
            <p>Your unique registration ID is:</p>
            <div class="generated-id" id="displayId">CAND-12345</div>
            <p>Please save this ID for future logins.</p>
            <a href="candidate.html" class="btn btn-primary" style="margin-top: 1rem; display: inline-block;">Go to Login</a>
        </div>

        <div id="registrationForms">
            <div class="role-toggle">
                <button class="role-btn active" onclick="switchRole('voter')">I am a Voter</button>
                <button class="role-btn" onclick="switchRole('candidate')">I am a Candidate</button>
            </div>

            <!-- Voter Registration Form -->
            <form id="voterForm" class="form-section active" onsubmit="handleRegister(event, 'voter')">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Full Name *</label>
                        <input type="text" class="form-control" name="fullName" required>
                    </div>
                    <div class="form-group">
                        <label>Voter ID Number *</label>
                        <input type="text" class="form-control" name="voterId" pattern="[A-Z]{3}[0-9]{7}" title="Format: 3 letters followed by 7 numbers (e.g., ABC1234567)" required>
                    </div>
                    <div class="form-group">
                        <label>Aadhaar Number *</label>
                        <input type="text" class="form-control" name="aadhaar" pattern="[0-9]{12}" title="12 digit number" required>
                    </div>
                    <div class="form-group">
                        <label>Mobile Number *</label>
                        <input type="tel" class="form-control" name="mobile" pattern="[0-9]{10}" title="10 digit number" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address *</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>
                    <div class="form-group">
                        <label>City *</label>
                        <input type="text" class="form-control" name="city" required>
                    </div>
                    <div class="form-group">
                        <label>Locality / Area *</label>
                        <input type="text" class="form-control" name="locality" required>
                    </div>
                    <div class="form-group">
                        <label>Password *</label>
                        <input type="password" class="form-control" name="password" minlength="8" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary submit-btn">Register as Voter</button>
            </form>

            <!-- Candidate Registration Form -->
            <form id="candidateForm" class="form-section" onsubmit="handleRegister(event, 'candidate')">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Full Name *</label>
                        <input type="text" class="form-control" name="fullName" required>
                    </div>
                    <div class="form-group">
                        <label>Party Name *</label>
                        <input type="text" class="form-control" name="partyName" required>
                    </div>
                    <div class="form-group">
                        <label>Designation *</label>
                        <select class="form-control" name="designation" required>
                            <option value="">Select Designation</option>
                            <option value="MP">MP (Member of Parliament)</option>
                            <option value="MLA">MLA (Member of Legislative Assembly)</option>
                            <option value="Mayor">Mayor</option>
                            <option value="Councillor">Councillor</option>
                            <option value="Sarpanch">Sarpanch</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Constituency Pin Code *</label>
                        <input type="text" class="form-control" name="pincode" pattern="[0-9]{6}" title="6 digit pin code" required>
                    </div>
                    <div class="form-group">
                        <label>Aadhaar Number *</label>
                        <input type="text" class="form-control" name="aadhaar" pattern="[0-9]{12}" title="12 digit number" required>
                    </div>
                    <div class="form-group">
                        <label>Elected ID Number *</label>
                        <input type="text" class="form-control" name="electedId" required>
                    </div>
                    <div class="form-group">
                        <label>Tenure (Start Year - End Year) *</label>
                        <input type="text" class="form-control" name="tenure" placeholder="e.g. 2024-2029" pattern="[0-9]{4}-[0-9]{4}" title="Format: YYYY-YYYY" required>
                    </div>
                    <div class="form-group">
                        <label>Mobile Number *</label>
                        <input type="tel" class="form-control" name="mobile" pattern="[0-9]{10}" title="10 digit number" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address *</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>
                    <div class="form-group">
                        <label>Password *</label>
                        <input type="password" class="form-control" name="password" minlength="8" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-saffron submit-btn" style="color:white; background:var(--saffron-color);">Register as Candidate</button>
            </form>

            <div class="auth-links">
                <p>Already have an account? <a href="candidate.html" class="text-blue">Login here</a></p>
            </div>
        </div>
    </div>

    <script src="register.js"></script>
</body>
</html>
