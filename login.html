<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoteLens - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-container {
            max-width: 450px;
            margin: 6rem auto;
            padding: 3rem 2.5rem;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h2 {
            margin-bottom: 0.5rem;
            color: var(--text-color);
        }

        .login-header p {
            color: #666;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-color);
        }

        .form-control {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 1px solid #e1e8ed;
            border-radius: 0.5rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(10, 61, 145, 0.1);
        }
        
        .password-container {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #666;
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 1rem;
        }

        .auth-links {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.95rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .error-message {
            display: none;
            background: #ffebee;
            color: #c62828;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            text-align: center;
            border: 1px solid #ffcdd2;
        }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar glass">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-eye text-saffron"></i> Vote<span class="text-blue">Lens</span>
            </a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="register.html" class="btn btn-outline">Register</a>
                <a href="login.html" class="btn btn-primary">Login</a>
            </div>
        </div>
    </nav>

    <div class="login-container">
        <div class="login-header">
            <h2>Welcome Back</h2>
            <p>Sign in to your Voter or Candidate account</p>
        </div>

        <div class="error-message" id="loginError">
            <i class="fa-solid fa-circle-exclamation"></i> <span id="errorText">Invalid email or password.</span>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" class="form-control" id="loginEmail" required placeholder="Enter your registered email">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <div class="password-container">
                    <input type="password" class="form-control" id="loginPassword" required placeholder="Enter your password">
                    <i class="fa-solid fa-eye toggle-password" id="togglePasswordBtn"></i>
                </div>
            </div>

            <button type="submit" class="btn btn-primary submit-btn">Sign In</button>
        </form>

        <div class="auth-links">
            <a href="#" class="text-blue">Forgot your password?</a>
            <p style="margin-top: 1rem;">Don't have an account? <a href="register.html" class="text-saffron font-weight-bold">Register here</a></p>
        </div>
    </div>

    <!-- The Auth Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Password Toggle
            const togglePasswordBtn = document.getElementById('togglePasswordBtn');
            const passwordInput = document.getElementById('loginPassword');
            
            togglePasswordBtn.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.classList.toggle('fa-eye-slash');
            });

            // Handle Login Submission
            document.getElementById('loginForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const email = document.getElementById('loginEmail').value.trim();
                const password = document.getElementById('loginPassword').value;
                const errorBox = document.getElementById('loginError');
                
                // Get users from localStorage map
                const users = JSON.parse(localStorage.getItem('voteLensUsers')) || [];
                
                // Simple mock Auth check
                const user = users.find(u => u.email === email);
                
                // Check if user exists and password 'hash' matches (using btoa for mock)
                if (user && user.passwordHash === btoa(password)) {
                    // Success! Store the active session
                    const sessionData = {
                        id: user.uniqueId,
                        role: user.role,
                        name: user.name,
                        email: user.email,
                        timestamp: new Date().getTime()
                    };
                    localStorage.setItem('voteLensActiveUser', JSON.stringify(sessionData));
                    
                    // Redirect to profile/dashboard page
                    window.location.href = 'profile.html';
                } else {
                    // Fail
                    errorBox.style.display = 'block';
                }
            });
            
            // Auto redirect if already logged in
            const activeUser = localStorage.getItem('voteLensActiveUser');
            if(activeUser) {
                window.location.href = 'profile.html';
            }
        });
    </script>
</body>
</html>
